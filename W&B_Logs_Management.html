  <script type="text/babel">// Run Detail Page with Chart.js charts
const { useState, useEffect, useRef, useCallback } = React;

const LINE_COLORS = [
  '#4B6BFB','#F59E0B','#10B981','#EF4444','#8B5CF6','#06B6D4','#F97316',
];

function MetricChart({ history, metricKey, color = '#4B6BFB', label }) {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);

  useEffect(() => {
    if (!canvasRef.current || !history.length) return;
    const points = history
      .filter(h => h[metricKey] != null)
      .map(h => ({ x: h.epoch ?? h._step ?? h._runtime, y: h[metricKey] }))
      .filter(p => p.x != null);
    if (!points.length) return;

    if (chartRef.current) chartRef.current.destroy();
    chartRef.current = new Chart(canvasRef.current, {
      type: 'line',
      data: {
        datasets: [{
          label: label || metricKey,
          data: points,
          borderColor: color,
          backgroundColor: color + '18',
          borderWidth: 2,
          pointRadius: points.length > 80 ? 0 : 3,
          pointHoverRadius: 5,
          tension: 0.3,
          fill: true,
        }],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              title: items => `Epoch / Step: ${items[0].parsed.x}`,
              label: item => `${metricKey}: ${item.parsed.y.toFixed(5)}`,
            },
          },
        },
        scales: {
          x: {
            type: 'linear',
            title: { display: true, text: 'Epoch / Step', font: { size: 11 }, color: '#9D9890' },
            grid: { color: '#F3F2EF' },
            ticks: { color: '#9D9890', font: { size: 11 } },
          },
          y: {
            title: { display: true, text: metricKey, font: { size: 11 }, color: '#9D9890' },
            grid: { color: '#F3F2EF' },
            ticks: { color: '#9D9890', font: { size: 11 } },
          },
        },
      },
    });
    return () => { if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; } };
  }, [history, metricKey, color]);

  if (!history.length) return <div style={{ color: '#9D9890', fontSize: 13, padding: 12 }}>暂无历史数据</div>;
  const hasMetric = history.some(h => h[metricKey] != null);
  if (!hasMetric) return <div style={{ color: '#9D9890', fontSize: 13, padding: 12 }}>该 metric 无数据</div>;

  return <div style={{ height: 220, position: 'relative' }}><canvas ref={canvasRef} /></div>;
}

function EditableField({ value, onSave, placeholder, multiline, style: s = {} }) {
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState(value || '');
  useEffect(() => { setDraft(value || ''); }, [value]);

  const commit = () => { setEditing(false); onSave(draft.trim()); };

  if (editing) {
    return multiline ? (
      <textarea
        autoFocus value={draft} onChange={e => setDraft(e.target.value)}
        onBlur={commit}
        style={{ width: '100%', boxSizing: 'border-box', padding: '6px 10px', borderRadius: 7, border: '1px solid #4B6BFB', fontSize: 14, fontFamily: 'inherit', resize: 'vertical', minHeight: 80, ...s }}
      />
    ) : (
      <input
        autoFocus value={draft} onChange={e => setDraft(e.target.value)}
        onBlur={commit} onKeyDown={e => e.key === 'Enter' && commit()}
        style={{ padding: '4px 8px', borderRadius: 7, border: '1px solid #4B6BFB', fontSize: 16, fontWeight: 700, fontFamily: 'inherit', ...s }}
      />
    );
  }

  return (
    <span
      onClick={() => setEditing(true)}
      title="点击编辑"
      style={{ cursor: 'text', borderBottom: '1.5px dashed #D1D5DB', ...s }}
    >
      {value || <span style={{ color: '#B0A99E', fontStyle: 'italic' }}>{placeholder}</span>}
    </span>
  );
}

function TagEditor({ tags, tagLib, onChangeTags, onChangeTagLib }) {
  const [input, setInput] = useState('');

  const addTag = name => {
    const t = name.trim();
    if (!t || tags.includes(t)) return;
    const newLib = WBStore.addTagToLib(t);
    onChangeTagLib(newLib);
    onChangeTags([...tags, t]);
    setInput('');
  };

  const removeTag = t => onChangeTags(tags.filter(x => x !== t));

  const suggestions = tagLib.filter(l => !tags.includes(l.name) && l.name.toLowerCase().includes(input.toLowerCase()));

  return (
    <div>
      <div style={{ display: 'flex', flexWrap: 'wrap', gap: 5, marginBottom: 8 }}>
        {tags.map(t => <TagChip key={t} tag={t} tagLib={tagLib} onRemove={removeTag} />)}
      </div>
      <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
        <input
          value={input} onChange={e => setInput(e.target.value)}
          onKeyDown={e => { if (e.key === 'Enter') { addTag(input); e.preventDefault(); } }}
          placeholder="输入标签后按 Enter"
          style={{ padding: '5px 10px', borderRadius: 7, border: '1px solid #E4E1DA', fontSize: 13, fontFamily: 'inherit', outline: 'none', width: 160 }}
        />
        {suggestions.slice(0, 5).map(s => (
          <button key={s.name} onClick={() => addTag(s.name)} style={{
            padding: '4px 10px', borderRadius: 7, border: '1px dashed #D1D5DB',
            fontSize: 12, background: '#FAFAF8', cursor: 'pointer', fontFamily: 'inherit', color: '#6B6560',
          }}>+ {s.name}</button>
        ))}
      </div>
    </div>
  );
}

function ConfigTable({ config, cmdArgs }) {
  const [search, setSearch] = useState('');
  const [useCmd, setUseCmd] = useState(() => WBStore.getUseCommandArgs('_global'));
  const hasCmdArgs = cmdArgs && Object.keys(cmdArgs).length > 0;

  const merged = useMemo(() => {
    const base = { ...(useCmd && hasCmdArgs ? cmdArgs : {}), ...config };
    return base;
  }, [config, cmdArgs, useCmd, hasCmdArgs]);

  const q = search.toLowerCase();
  const entries = Object.entries(merged).filter(([k]) => !q || k.toLowerCase().includes(q));
  const cmdKeys = new Set(cmdArgs ? Object.keys(cmdArgs) : []);

  const handleToggle = val => {
    setUseCmd(val);
    WBStore.setUseCommandArgs('_global', val);
  };

  return (
    <div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 10, flexWrap: 'wrap' }}>
        <input
          value={search} onChange={e => setSearch(e.target.value)}
          placeholder="搜索参数…"
          style={{ flex: 1, minWidth: 120, padding: '6px 10px', borderRadius: 7, border: '1px solid #E4E1DA', fontSize: 13, fontFamily: 'inherit', outline: 'none' }}
        />
        {hasCmdArgs && (
          <label style={{ display: 'flex', alignItems: 'center', gap: 6, cursor: 'pointer', userSelect: 'none', whiteSpace: 'nowrap' }}>
            <input type="checkbox" checked={useCmd} onChange={e => handleToggle(e.target.checked)}
              style={{ width: 13, height: 13, accentColor: '#4B6BFB', cursor: 'pointer' }} />
            <span style={{ fontSize: 12, color: '#6B6560' }}>
              合并 Command 参数
              <span style={{ marginLeft: 4, fontSize: 11, color: '#9D9890' }}>（{Object.keys(cmdArgs).length} 项）</span>
            </span>
          </label>
        )}
      </div>
      <div style={{ borderRadius: 8, border: '1px solid #E4E1DA', overflow: 'hidden' }}>
        {entries.length === 0 ? <div style={{ padding: 16, color: '#9D9890', fontSize: 13 }}>无匹配参数</div> :
          entries.map(([k, v], i) => {
            const fromCmd = useCmd && cmdKeys.has(k) && !(k in config);
            return (
              <div key={k} style={{
                display: 'flex', padding: '8px 12px', gap: 16,
                background: i % 2 === 0 ? '#FAFAF8' : '#fff',
                borderBottom: i < entries.length - 1 ? '1px solid #F0EDE7' : 'none',
              }}>
                <span style={{ fontFamily: 'monospace', fontSize: 12, color: fromCmd ? '#9D9890' : '#4B6BFB', minWidth: 140, flexShrink: 0 }}>{k}</span>
                <span style={{ fontSize: 13, color: '#1C1A17', wordBreak: 'break-all', flex: 1 }}>
                  {typeof v === 'object' ? JSON.stringify(v) : String(v ?? '—')}
                </span>
                {fromCmd && <span style={{ fontSize: 10, color: '#B0A99E', flexShrink: 0, alignSelf: 'center' }}>CMD</span>}
              </div>
            );
          })
        }
      </div>
    </div>
  );
}

function DetailPage({ run, meta, tagLib, onToggleFav, onSaveMeta, onChangeTagLib, onBack, settings }) {
  const [history, setHistory] = useState([]);
  const [histLoading, setHistLoading] = useState(false);
  const [activeTab, setActiveTab] = useState('charts');

  const alias = meta.alias || run.displayName || run.name;
  const config = parseConfig(run.config || {});
  const summary = run.summary || {};
  const metrics = settings.metrics || ['train_loss'];
  const { apiKey, entity } = settings;
  const project = run._project || settings.projects?.[0] || '';

  useEffect(() => {
    if (!apiKey || !entity || !project) return;
    setHistLoading(true);
    const summaryKeys = Object.keys(run.summary || {}).filter(k => !k.startsWith('_') && typeof (run.summary||{})[k] === 'number');
    WBApi.loadHistory(apiKey, entity, project, run.name, 500, summaryKeys)
      .then(setHistory)
      .catch(err => { alert('历史数据加载失败：' + err.message); setHistory([]); })
      .finally(() => setHistLoading(false));
  }, [run.name]);

  // Detect numeric metrics available in history
  const availableMetrics = useMemo(() => {
    if (!history.length) return metrics;
    const keys = new Set();
    history.forEach(h => Object.entries(h).forEach(([k, v]) => {
      if (!k.startsWith('_') && typeof v === 'number') keys.add(k);
    }));
    const configured = metrics.filter(m => keys.has(m));
    const extra = [...keys].filter(k => !metrics.includes(k) && k !== 'epoch');
    return [...configured, ...extra];
  }, [history, metrics]);

  const [selectedChartMetrics, setSelectedChartMetrics] = useState(null);
  React.useEffect(() => {
    if (availableMetrics.length) setSelectedChartMetrics(availableMetrics.slice(0, 6));
  }, [run.name]);

  const toggleChartMetric = (m) => setSelectedChartMetrics(prev => {
    const p = prev || [];
    return p.includes(m) ? p.filter(x => x !== m) : [...p, m];
  });

  const visibleMetrics = (selectedChartMetrics || availableMetrics).filter(m => availableMetrics.includes(m));

  const [logs, setLogs] = useState(null);
  const [logsLoading, setLogsLoading] = useState(false);
  const [logsError, setLogsError] = useState('');
  const logsRef = useRef(null);

  const fetchLogs = useCallback(() => {
    if (!apiKey || !entity || !project) return;
    setLogsLoading(true); setLogsError('');
    WBApi.loadLogs(apiKey, entity, project, run.name)
      .then(text => { setLogs(text); setTimeout(() => { if (logsRef.current) logsRef.current.scrollTop = logsRef.current.scrollHeight; }, 50); })
      .catch(e => setLogsError(e.message))
      .finally(() => setLogsLoading(false));
  }, [run.name, apiKey, entity, project]);

  useEffect(() => { if (activeTab === 'logs' && logs === null && !logsLoading) fetchLogs(); }, [activeTab]);

  const [runMeta, setRunMeta] = useState(null);
  const [runMetaLoading, setRunMetaLoading] = useState(false);
  useEffect(() => {
    if ((activeTab !== 'overview' && activeTab !== 'config') || runMeta !== null || runMetaLoading) return;
    setRunMetaLoading(true);
    WBApi.loadMetadata(apiKey, entity, project, run.name)
      .then(m => {
        setRunMeta(m || {});
        if (m?.args?.length) WBStore.setCommandArgs(run.name, parseCommandArgs(m.args));
      })
      .catch(() => setRunMeta({}))
      .finally(() => setRunMetaLoading(false));
  }, [activeTab]);

  const tabs = ['charts', 'logs', 'overview', 'trainconfig', 'config', 'summary'];
  const tabLabels = { charts: '训练曲线', logs: 'Logs', overview: '概览', trainconfig: '训练配置', config: 'Config', summary: 'Summary' };

  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100%', minHeight: 0 }}>
      {/* Header */}
      <div style={{ padding: '12px 16px', borderBottom: '1px solid #E4E1DA', background: '#FAFAF8', flexShrink: 0 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 10 }}>
          <button onClick={onBack} style={{ border: 'none', background: 'none', cursor: 'pointer', fontSize: 20, color: '#6B6560', padding: '0 4px' }}>←</button>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <EditableField
                value={meta.alias}
                onSave={v => onSaveMeta({ alias: v })}
                placeholder={run.displayName || run.name}
                style={{ fontSize: 17, fontWeight: 700, color: '#1C1A17' }}
              />
              <StateBadge state={run.state} />
              <StarBtn active={!!meta.fav} onClick={() => onToggleFav(run.name)} />
            </div>
            <div style={{ fontSize: 11, color: '#B0A99E', fontFamily: 'monospace', marginTop: 2 }}>{run.name} · {fmtTime(run.createdAt)}</div>
          </div>
        </div>
        {/* Tags */}
        <TagEditor
          tags={meta.tags || run.tags || []}
          tagLib={tagLib}
          onChangeTags={tags => onSaveMeta({ tags })}
          onChangeTagLib={onChangeTagLib}
        />
      </div>

      {/* Notes */}
      <div style={{ padding: '10px 16px', borderBottom: '1px solid #E4E1DA', background: '#fff', flexShrink: 0 }}>
        <div style={{ fontSize: 11, color: '#9D9890', marginBottom: 4, textTransform: 'uppercase', letterSpacing: '0.05em' }}>备注</div>
        <EditableField
          value={meta.note}
          onSave={v => onSaveMeta({ note: v })}
          placeholder="点击添加备注…"
          multiline
          style={{ fontSize: 13, color: '#1C1A17', display: 'block', width: '100%' }}
        />
      </div>

      {/* Tabs */}
      <div style={{ display: 'flex', gap: 0, borderBottom: '1px solid #E4E1DA', background: '#fff', flexShrink: 0 }}>
        {tabs.map(t => (
          <button key={t} onClick={() => setActiveTab(t)} style={{
            padding: '10px 18px', border: 'none', background: 'none',
            borderBottom: activeTab === t ? '2px solid #4B6BFB' : '2px solid transparent',
            color: activeTab === t ? '#4B6BFB' : '#6B6560',
            fontWeight: activeTab === t ? 600 : 400,
            cursor: 'pointer', fontSize: 13, fontFamily: 'inherit',
            transition: 'color 0.15s',
          }}>{tabLabels[t]}</button>
        ))}
      </div>

      {/* Tab content */}
      <div style={{ flex: 1, overflowY: 'auto', padding: 16 }}>
        {activeTab === 'charts' && (
          histLoading ? (
            <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
              {[1,2].map(i => <Skeleton key={i} height={220} radius={8} />)}
            </div>
          ) : history.length === 0 ? (
            <EmptyState icon="📈" title="暂无训练曲线数据" desc="历史数据未能加载，请检查 API 配置" />
          ) : (
            <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
              {/* Metric selector */}
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
                {availableMetrics.map(m => {
                  const on = (selectedChartMetrics || []).includes(m);
                  return (
                    <button key={m} onClick={() => toggleChartMetric(m)} style={{
                      padding: '3px 10px', borderRadius: 20, border: '1px solid',
                      borderColor: on ? '#4B6BFB' : '#E4E1DA',
                      background: on ? '#EEF1FF' : '#fff',
                      color: on ? '#4B6BFB' : '#9D9890',
                      fontSize: 12, cursor: 'pointer', fontFamily: 'inherit',
                      fontWeight: on ? 600 : 400,
                    }}>{on ? '✓ ' : ''}{m}</button>
                  );
                })}
              </div>
              {/* Charts */}
              {visibleMetrics.map((m, i) => (
                <div key={m} style={{ background: '#fff', border: '1px solid #E4E1DA', borderRadius: 10, padding: 16 }}>
                  <div style={{ fontSize: 13, fontWeight: 600, color: '#1C1A17', marginBottom: 10 }}>{m}</div>
                  <MetricChart history={history} metricKey={m} color={LINE_COLORS[i % LINE_COLORS.length]} />
                </div>
              ))}
              {visibleMetrics.length === 0 && (
                <div style={{ textAlign: 'center', color: '#9D9890', fontSize: 13, padding: 40 }}>请在上方选择要显示的指标</div>
              )}
            </div>
          )
        )}

        {activeTab === 'logs' && (
          logsLoading ? (
            <Skeleton height={400} radius={8} />
          ) : logsError ? (
            <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 12, padding: 40 }}>
              <div style={{ fontSize: 13, color: '#E03131' }}>{logsError}</div>
              <button onClick={fetchLogs} style={{ padding: '6px 16px', borderRadius: 7, border: '1px solid #E4E1DA', background: '#fff', cursor: 'pointer', fontSize: 13, fontFamily: 'inherit' }}>重试</button>
            </div>
          ) : logs === null ? (
            <EmptyState icon="📋" title="暂无日志" desc="点击加载获取运行日志" />
          ) : logs.trim() === '' ? (
            <EmptyState icon="📋" title="日志为空" desc="该 run 的 output.log 没有内容" />
          ) : (
            <div style={{ position: 'relative' }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
                <span style={{ fontSize: 11, color: '#9D9890' }}>{logs.split('\n').length} 行</span>
                <button onClick={fetchLogs} style={{ border: 'none', background: 'none', cursor: 'pointer', fontSize: 12, color: '#4B6BFB', fontFamily: 'inherit' }}>刷新</button>
              </div>
              <div ref={logsRef} style={{
                background: '#1C1A17', color: '#E8E4DE', borderRadius: 8,
                padding: '12px 14px', fontFamily: 'monospace', fontSize: 12,
                lineHeight: 1.7, overflowY: 'auto', maxHeight: 'calc(100vh - 320px)',
                whiteSpace: 'pre-wrap', wordBreak: 'break-all',
              }}>
                {logs}
              </div>
              <button onClick={() => { if (logsRef.current) logsRef.current.scrollTop = logsRef.current.scrollHeight; }}
                style={{ position: 'absolute', bottom: 12, right: 12, border: 'none',
                  background: 'rgba(75,107,251,0.85)', color: '#fff', borderRadius: 20,
                  padding: '4px 12px', fontSize: 12, cursor: 'pointer', fontFamily: 'inherit' }}>
                ↓ 底部
              </button>
            </div>
          )
        )}

        {activeTab === 'overview' && (runMetaLoading ? <Skeleton height={200} radius={8} /> : (() => {
          const meta = runMeta || {};
          const program = meta.program || '';
          const args = Array.isArray(meta.args) ? meta.args : [];
          const command = program ? ['python', program, ...args].join(' ') : null;
          const rows = [
            command && { label: 'Command', value: command, mono: true },
            meta.host && { label: 'Host', value: meta.host },
            meta.os && { label: 'OS', value: meta.os },
            meta.python && { label: 'Python', value: meta.python },
            meta.gpu && { label: 'GPU', value: `${meta.gpu}${meta.gpuCount > 1 ? ` × ${meta.gpuCount}` : ''}` },
            meta.gpuCount && !meta.gpu && { label: 'GPU Count', value: String(meta.gpuCount) },
            meta.cpu && { label: 'CPU', value: meta.cpu },
            meta.git?.commit && { label: 'Git Commit', value: meta.git.commit, mono: true },
            meta.git?.remote && { label: 'Git Remote', value: meta.git.remote, mono: true },
            meta.codeSaved != null && { label: 'Code Saved', value: meta.codeSaved ? '是' : '否' },
            run.heartbeatAt && { label: '最后心跳', value: new Date(run.heartbeatAt).toLocaleString() },
          ].filter(Boolean);

          if (!rows.length) return <EmptyState icon="ℹ️" title="无概览数据" desc="该 run 未上传 metadata" />;

          return (
            <div style={{ borderRadius: 8, border: '1px solid #E4E1DA', overflow: 'hidden' }}>
              {rows.map(({ label, value, mono }, i) => (
                <div key={label} style={{
                  display: 'flex', alignItems: 'flex-start', gap: 16, padding: '9px 14px',
                  background: i % 2 === 0 ? '#FAFAF8' : '#fff',
                  borderBottom: i < rows.length - 1 ? '1px solid #F0EDE7' : 'none',
                }}>
                  <span style={{ fontSize: 12, fontWeight: 600, color: '#6B6560', minWidth: 100, flexShrink: 0, paddingTop: 1 }}>{label}</span>
                  <span style={{
                    fontSize: 12, color: '#1C1A17', wordBreak: 'break-all', lineHeight: 1.6,
                    fontFamily: mono ? 'monospace' : 'inherit',
                    background: mono ? '#F5F4F1' : 'none',
                    padding: mono ? '2px 6px' : '0',
                    borderRadius: mono ? 4 : 0,
                  }}>{value}</span>
                </div>
              ))}
            </div>
          );
        })())}

        {activeTab === 'trainconfig' && <CustomConfigTab runName={run.name} />}

        {activeTab === 'config' && (() => {
          const cmdArgs = WBStore.getCommandArgs(run.name);
          const isEmpty = Object.keys(config).length === 0 && (!cmdArgs || Object.keys(cmdArgs).length === 0);
          return isEmpty
            ? <EmptyState icon="⚙️" title="无 Config 数据" />
            : <ConfigTable config={config} cmdArgs={cmdArgs} />;
        })()}

        {activeTab === 'summary' && (
          <div style={{ borderRadius: 8, border: '1px solid #E4E1DA', overflow: 'hidden' }}>
            {Object.entries(summary).filter(([k]) => !k.startsWith('_')).map(([k, v], i, arr) => (
              <div key={k} style={{
                display: 'flex', padding: '8px 12px', gap: 16,
                background: i % 2 === 0 ? '#FAFAF8' : '#fff',
                borderBottom: i < arr.length - 1 ? '1px solid #F0EDE7' : 'none',
              }}>
                <span style={{ fontFamily: 'monospace', fontSize: 12, color: '#10B981', minWidth: 140, flexShrink: 0 }}>{k}</span>
                <span style={{ fontSize: 13, color: '#1C1A17', wordBreak: 'break-all' }}>
                  {typeof v === 'number' ? v.toFixed(6) : typeof v === 'object' ? JSON.stringify(v) : String(v ?? '—')}
                </span>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

Object.assign(window, { DetailPage });
</script>
  <script type="text/babel">// Compare Page - side-by-side run comparison with param diff + overlaid metric charts
const { useState, useEffect, useRef, useMemo } = React;

const COMPARE_COLORS = ['#4B6BFB','#F59E0B','#10B981','#EF4444','#8B5CF6'];

function OverlayChart({ datasets, metricKey }) {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);

  useEffect(() => {
    if (!canvasRef.current) return;
    if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; }

    const chartDatasets = datasets
      .map(({ run, history, color }) => {
        const points = history
          .filter(h => h[metricKey] != null)
          .map(h => ({ x: h.epoch ?? h._step ?? h._runtime, y: h[metricKey] }))
          .filter(p => p.x != null);
        if (!points.length) return null;
        const alias = (WBStore.getMeta(run.name) || {}).alias || run.displayName || run.name;
        return {
          label: alias,
          data: points,
          borderColor: color,
          backgroundColor: color + '15',
          borderWidth: 2,
          pointRadius: points.length > 80 ? 0 : 3,
          tension: 0.3,
          fill: false,
        };
      })
      .filter(Boolean);

    if (!chartDatasets.length) return;

    chartRef.current = new Chart(canvasRef.current, {
      type: 'line',
      data: { datasets: chartDatasets },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: {
            display: true,
            position: 'bottom',
            labels: { font: { size: 11 }, boxWidth: 12, color: '#6B6560' },
          },
          tooltip: {
            callbacks: {
              title: items => `Step / Epoch: ${items[0].parsed.x}`,
            },
          },
        },
        scales: {
          x: {
            type: 'linear',
            title: { display: true, text: 'Epoch / Step', font: { size: 11 }, color: '#9D9890' },
            grid: { color: '#F3F2EF' },
            ticks: { color: '#9D9890', font: { size: 11 } },
          },
          y: {
            title: { display: true, text: metricKey, font: { size: 11 }, color: '#9D9890' },
            grid: { color: '#F3F2EF' },
            ticks: { color: '#9D9890', font: { size: 11 } },
          },
        },
      },
    });
    return () => { if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; } };
  }, [datasets, metricKey]);

  return <div style={{ height: 260, position: 'relative' }}><canvas ref={canvasRef} /></div>;
}

function ParamDiffTable({ runs, allConfigs }) {
  const [showSame, setShowSame] = useState(false);
  const [search, setSearch] = useState('');

  const allKeys = useMemo(() => {
    const s = new Set();
    allConfigs.forEach(c => Object.keys(c).forEach(k => s.add(k)));
    return [...s].sort();
  }, [allConfigs]);

  const rows = useMemo(() => {
    return allKeys
      .filter(k => k.toLowerCase().includes(search.toLowerCase()))
      .map(k => {
        const vals = allConfigs.map(c => {
          const v = c[k];
          return v === undefined ? '—' : typeof v === 'object' ? JSON.stringify(v) : String(v);
        });
        const same = vals.every(v => v === vals[0]);
        return { k, vals, same };
      })
      .filter(r => showSame || !r.same);
  }, [allKeys, allConfigs, showSame, search]);

  return (
    <div>
      <div style={{ display: 'flex', gap: 10, alignItems: 'center', marginBottom: 12, flexWrap: 'wrap' }}>
        <input
          value={search} onChange={e => setSearch(e.target.value)}
          placeholder="搜索参数…"
          style={{ padding: '6px 10px', borderRadius: 7, border: '1px solid #E4E1DA', fontSize: 13, fontFamily: 'inherit', outline: 'none', flex: 1, minWidth: 140 }}
        />
        <label style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 13, color: '#6B6560', cursor: 'pointer', userSelect: 'none' }}>
          <input type="checkbox" checked={showSame} onChange={e => setShowSame(e.target.checked)} style={{ accentColor: '#4B6BFB' }} />
          显示相同参数
        </label>
        {!showSame && <span style={{ fontSize: 12, color: '#9D9890' }}>只显示差异</span>}
      </div>

      {rows.length === 0 ? (
        <div style={{ color: '#9D9890', fontSize: 13, padding: 16, textAlign: 'center' }}>
          {showSame ? '无参数' : '所有参数相同'}
        </div>
      ) : (
        <div style={{ overflowX: 'auto' }}>
          <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
            <thead>
              <tr style={{ background: '#F3F2EF' }}>
                <th style={thStyle}>参数</th>
                {runs.map((r, i) => {
                  const alias = (WBStore.getMeta(r.name) || {}).alias || r.displayName || r.name;
                  return (
                    <th key={r.name} style={{ ...thStyle, color: COMPARE_COLORS[i] }}>{alias}</th>
                  );
                })}
              </tr>
            </thead>
            <tbody>
              {rows.map(({ k, vals, same }, ri) => (
                <tr key={k} style={{ background: same ? '#fff' : '#FFF7ED' }}>
                  <td style={{ ...tdStyle, fontFamily: 'monospace', fontSize: 11, color: '#6B6560' }}>{k}</td>
                  {vals.map((v, i) => (
                    <td key={i} style={{ ...tdStyle, fontWeight: same ? 400 : 600 }}>{v}</td>
                  ))}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

function SummaryRow({ runs }) {
  const keys = useMemo(() => {
    const s = new Set();
    runs.forEach(r => Object.keys(r.summary || {}).filter(k => !k.startsWith('_')).forEach(k => s.add(k)));
    return [...s];
  }, [runs]);

  if (!keys.length) return null;

  return (
    <div style={{ overflowX: 'auto', marginBottom: 20 }}>
      <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
        <thead>
          <tr style={{ background: '#F3F2EF' }}>
            <th style={thStyle}>Metric</th>
            {runs.map((r, i) => {
              const alias = (WBStore.getMeta(r.name) || {}).alias || r.displayName || r.name;
              return <th key={r.name} style={{ ...thStyle, color: COMPARE_COLORS[i] }}>{alias}</th>;
            })}
          </tr>
        </thead>
        <tbody>
          {keys.map((k, ri) => (
            <tr key={k} style={{ background: ri % 2 === 0 ? '#FAFAF8' : '#fff' }}>
              <td style={{ ...tdStyle, fontFamily: 'monospace', fontSize: 11, color: '#10B981' }}>{k}</td>
              {runs.map(r => {
                const v = (r.summary || {})[k];
                return (
                  <td key={r.name} style={tdStyle}>
                    {v == null ? '—' : typeof v === 'number' ? v.toFixed(5) : String(v)}
                  </td>
                );
              })}
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

function ComparePage({ runs, onBack, onOpenRun, settings }) {
  const [histories, setHistories] = useState({});
  const [loading, setLoading] = useState(true);
  const [activeTab, setActiveTab] = useState('charts');
  const [selectedMetrics, setSelectedMetrics] = useState(null);

  const { apiKey, entity } = settings;

  useEffect(() => {
    if (!apiKey || !entity || !runs.length) { setLoading(false); return; }
    let cancelled = false;
    setLoading(true);
    Promise.all(runs.map(r => {
      const project = r._project || settings.projects?.[0] || '';
      return WBApi.loadHistory(apiKey, entity, project, r.name, 400)
        .then(h => [r.name, h]);
    })).then(results => {
      if (cancelled) return;
      const map = {};
      results.forEach(([name, h]) => { map[name] = h; });
      setHistories(map);
      setLoading(false);
    }).catch(() => setLoading(false));
    return () => { cancelled = true; };
  }, [runs.map(r => r.name).join(',')]);

  const allConfigs = useMemo(() => runs.map(r => {
    const cfg = parseConfig(r.config || {});
    const cmd = WBStore.getCommandArgs(r.name) || {};
    return { ...cmd, ...cfg };
  }), [runs]);

  // Detect all available numeric metrics across all histories
  const availableMetrics = useMemo(() => {
    const s = new Set();
    Object.values(histories).forEach(h =>
      h.forEach(row => Object.entries(row).forEach(([k, v]) => {
        if (!k.startsWith('_') && k !== 'epoch' && typeof v === 'number') s.add(k);
      }))
    );
    const configured = (settings.metrics || ['train_loss']).filter(m => s.has(m));
    const rest = [...s].filter(k => !configured.includes(k));
    return [...configured, ...rest];
  }, [histories, settings.metrics]);

  useEffect(() => {
    if (availableMetrics.length && !selectedMetrics) setSelectedMetrics(availableMetrics.slice(0, 3));
  }, [availableMetrics]);

  const datasets = runs.map((r, i) => ({
    run: r,
    history: histories[r.name] || [],
    color: COMPARE_COLORS[i % COMPARE_COLORS.length],
  }));

  const tabs = ['charts', 'params', 'trainconfig', 'summary'];
  const tabLabels = { charts: '曲线对比', params: '参数差异', trainconfig: '配置对比', summary: 'Summary 对比' };

  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100%', minHeight: 0 }}>
      {/* Header */}
      <div style={{ padding: '12px 16px', borderBottom: '1px solid #E4E1DA', background: '#FAFAF8', flexShrink: 0 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 10 }}>
          <button onClick={onBack} style={{ border: 'none', background: 'none', cursor: 'pointer', fontSize: 20, color: '#6B6560', padding: '0 4px' }}>←</button>
          <span style={{ fontWeight: 700, fontSize: 16 }}>对比 {runs.length} 条训练</span>
        </div>
        {/* Run color legend — click to open detail */}
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
          {runs.map((r, i) => {
            const alias = (WBStore.getMeta(r.name) || {}).alias || r.displayName || r.name;
            return (
              <button key={r.name} onClick={() => onOpenRun && onOpenRun(r)}
                title="点击查看详情"
                style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 13,
                  border: '1px solid', borderColor: COMPARE_COLORS[i] + '55',
                  borderRadius: 20, padding: '3px 10px 3px 8px',
                  background: COMPARE_COLORS[i] + '12',
                  cursor: onOpenRun ? 'pointer' : 'default',
                  fontFamily: 'inherit', transition: 'background 0.15s',
                }}
                onMouseEnter={e => { if (onOpenRun) e.currentTarget.style.background = COMPARE_COLORS[i] + '28'; }}
                onMouseLeave={e => e.currentTarget.style.background = COMPARE_COLORS[i] + '12'}
              >
                <span style={{ width: 10, height: 10, borderRadius: '50%', background: COMPARE_COLORS[i], flexShrink: 0 }} />
                <span style={{ color: COMPARE_COLORS[i], fontWeight: 600 }}>{alias}</span>
                <span style={{ fontSize: 10, color: COMPARE_COLORS[i] + 'AA' }}>↗</span>
              </button>
            );
          })}
        </div>
      </div>

      {/* Tabs */}
      <div style={{ display: 'flex', borderBottom: '1px solid #E4E1DA', background: '#fff', flexShrink: 0 }}>
        {tabs.map(t => (
          <button key={t} onClick={() => setActiveTab(t)} style={{
            padding: '10px 18px', border: 'none', background: 'none',
            borderBottom: activeTab === t ? '2px solid #4B6BFB' : '2px solid transparent',
            color: activeTab === t ? '#4B6BFB' : '#6B6560',
            fontWeight: activeTab === t ? 600 : 400,
            cursor: 'pointer', fontSize: 13, fontFamily: 'inherit',
          }}>{tabLabels[t]}</button>
        ))}
      </div>

      {/* Content */}
      <div style={{ flex: 1, overflowY: 'auto', padding: 16 }}>
        {activeTab === 'charts' && (
          loading ? (
            <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
              {[1,2].map(i => <Skeleton key={i} height={280} radius={8} />)}
            </div>
          ) : (
            <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
              {/* Metric selector */}
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, marginBottom: 10 }}>
                {availableMetrics.map(m => {
                  const on = (selectedMetrics || []).includes(m);
                  return (
                    <button key={m} onClick={() => setSelectedMetrics(prev => {
                      const p = prev || [];
                      return on ? p.filter(x => x !== m) : [...p, m];
                    })} style={{
                      padding: '4px 10px', borderRadius: 20, fontSize: 12, cursor: 'pointer',
                      border: on ? '1.5px solid #4B6BFB' : '1px solid #E4E1DA',
                      background: on ? '#EEF1FF' : '#fff', color: on ? '#4B6BFB' : '#6B6560',
                      fontFamily: 'inherit', fontWeight: on ? 600 : 400,
                    }}>{m}</button>
                  );
                })}
              </div>
              {(selectedMetrics || []).map(m => (
                <div key={m} style={{ background: '#fff', border: '1px solid #E4E1DA', borderRadius: 10, padding: 16, marginBottom: 10 }}>
                  <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 10, color: '#1C1A17' }}>{m}</div>
                  <OverlayChart datasets={datasets} metricKey={m} />
                </div>
              ))}
              {!(selectedMetrics || []).length && (
                <EmptyState icon="📊" title="请在上方选择要对比的指标" />
              )}
            </div>
          )
        )}

        {activeTab === 'params' && <ParamDiffTable runs={runs} allConfigs={allConfigs} />}

        {activeTab === 'trainconfig' && (() => {
          const customConfigs = runs.map(r => {
            const text = WBStore.getCustomConfig(r.name);
            if (!text.trim()) return {};
            try { return flattenJson(JSON.parse(text)); } catch { return {}; }
          });
          const hasAny = customConfigs.some(c => Object.keys(c).length > 0);
          if (!hasAny) return (
            <EmptyState icon="📄" title="暂无训练配置" desc="请在各训练详情页的「训练配置」tab 中粘贴 JSON 后再对比" />
          );
          return <ParamDiffTable runs={runs} allConfigs={customConfigs} />;
        })()}

        {activeTab === 'summary' && <SummaryRow runs={runs} />}
      </div>
    </div>
  );
}

const tdStyle = { padding: '7px 12px', borderBottom: '1px solid #F0EDE7', color: '#1C1A17', verticalAlign: 'top' };

Object.assign(window, { ComparePage });

  async fetch(request) {
    // CORS preflight
    if (request.method === "OPTIONS") {
      return new Response(null, {
        headers: {
          "Access-Control-Allow-Origin": "*",
          "Access-Control-Allow-Methods": "POST, OPTIONS",
          "Access-Control-Allow-Headers": "*",
          "Access-Control-Max-Age": "86400",
        },
      });
    }
    // Forward the request to W&B GraphQL API
    const upstream = await fetch("https://api.wandb.ai/graphql", {
      method: request.method,
      headers: {
        "Authorization": request.headers.get("Authorization") || "",
        "Content-Type": "application/json",
        "User-Agent": "wb-logs-proxy/1.0",
      },
      body: request.body,
    });
    const res = new Response(upstream.body, upstream);
    res.headers.set("Access-Control-Allow-Origin", "*");
    return res;
  }
};`;

          {projectList.length > 0 && (

        {[

// ─── Root App ─────────────────────────────────────────────────────────────────
function App() {
  const [page, setPage]               = useState('list');
  const [runs, setRuns]               = useState([]);
  const [allMeta, setAllMeta]         = useState(WBStore.getAllMeta());
  const [tagLib, setTagLib]           = useState(WBStore.getTagLib());
  const [loading, setLoading]         = useState(false);
  const [loadMsg, setLoadMsg]         = useState('');
  const [error, setError]             = useState('');
  const [compareSelected, setCompare] = useState([]);
  const [detailRun, setDetailRun]     = useState(null);
  const [isMobile, setIsMobile]       = useState(window.innerWidth < 768);

  const settings = WBStore.getSettings();
  const hasConfig = !!(settings.apiKey && settings.entity && settings.projects?.length);

  useEffect(() => {
    const onResize = () => setIsMobile(window.innerWidth < 768);
    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  }, []);

  const refreshMeta = useCallback(() => setAllMeta(WBStore.getAllMeta()), []);
  const refreshTagLib = useCallback(lib => setTagLib(lib || WBStore.getTagLib()), []);

  const loadRuns = useCallback(async () => {
    const s = WBStore.getSettings();
    if (!s.apiKey || !s.entity || !s.projects?.length) return;
    setLoading(true); setError('');
    try {
      const raw = await WBApi.loadAllRunsMulti(s.apiKey, s.entity, s.projects, (n, t, proj) => {
        setLoadMsg(`加载中 ${proj}… ${n}/${t}`);
      });
      const minEpoch = s.minEpoch ?? 2;
      const valid = raw.filter(r => {
        const count = getEpochCount(r);
        return count !== null && count >= minEpoch;
      });
      setRuns(valid);
      setLoadMsg('');
    } catch (e) {
      setError(e.message);
    } finally { setLoading(false); }
  }, []);

  useEffect(() => {
    if (hasConfig) loadRuns();
    else setPage('settings');
  }, []);

  const handleToggleFav = useCallback(runName => {
    WBStore.toggleFav(runName);
    refreshMeta();
  }, [refreshMeta]);

  const handleSaveMeta = useCallback((runName, patch) => {
    WBStore.patchMeta(runName, patch);
    refreshMeta();
  }, [refreshMeta]);

  const handleToggleCompare = useCallback(run => {
    setCompare(prev => {
      const exists = prev.some(r => r.name === run.name);
      if (exists) return prev.filter(r => r.name !== run.name);
      if (prev.length >= 5) return prev;
      return [...prev, run];
    });
  }, []);

  // Bridge for ListPage floating bar
  window.__goCompare    = () => setPage('compare');
  window.__clearCompare = () => setCompare([]);

  const handleNav = key => {
    setDetailRun(null);
    setPage(key);
    if (key === 'settings') return;
    if (!runs.length && !loading && hasConfig) loadRuns();
  };

  const metrics = settings.metrics || ['train_loss'];

  // ── Render ──
  const mainContent = () => {
    if (page === 'settings') {
      return <SettingsPage
        onSaved={() => { refreshMeta(); setPage('list'); loadRuns(); }}
      />;
    }

    if (loading) {
      return (
        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', height: '100%', gap: 16, color: '#9D9890' }}>
          <div style={{ fontSize: 36 }}>⏳</div>
          <div style={{ fontSize: 14 }}>{loadMsg || '加载中…'}</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8, width: '80%', maxWidth: 320 }}>
            {[1,2,3,4].map(i => <Skeleton key={i} height={80} radius={10} />)}
          </div>
        </div>
      );
    }

    if (error) {
      return (
        <EmptyState icon="⚠️" title="加载失败" desc={error}>
          <Btn onClick={loadRuns}>重试</Btn>
          <Btn variant="subtle" onClick={() => setPage('settings')} style={{ marginLeft: 8 }}>检查配置</Btn>
        </EmptyState>
      );
    }

    if (detailRun) {
      return (
        <DetailPage
          run={detailRun}
          meta={allMeta[detailRun.name] || {}}
          tagLib={tagLib}
          settings={settings}
          onToggleFav={handleToggleFav}
          onSaveMeta={patch => handleSaveMeta(detailRun.name, patch)}
          onChangeTagLib={refreshTagLib}
          onBack={() => setDetailRun(null)}
        />
      );
    }

    if (page === 'compare') {
      if (compareSelected.length < 2) {
        return <EmptyState icon="📊" title="请先选择至少 2 条训练进行对比" desc="在列表页开启对比模式，勾选训练后回到此页">
          <Btn onClick={() => setPage('list')}>去列表页</Btn>
        </EmptyState>;
      }
      return (
        <ComparePage
          runs={compareSelected}
          settings={settings}
          onBack={() => setPage('list')}
          onOpenRun={run => setDetailRun(run)}
        />
      );
    }

    return (
      <ListPage
        runs={runs}
        allMeta={allMeta}
        tagLib={tagLib}
        onToggleFav={handleToggleFav}
        onOpenRun={run => setDetailRun(run)}
        compareSelected={compareSelected}
        onToggleCompare={handleToggleCompare}
        favOnly={page === 'favs'}
        metrics={metrics}
      />
    );
  };

  return (
    <div style={{ display: 'flex', flexDirection: isMobile ? 'column' : 'row', height: '100dvh', fontFamily: "'Inter', system-ui, sans-serif", background: '#F9F8F5', overflow: 'hidden' }}>
      {!isMobile && <Sidebar page={detailRun ? '' : page} onNav={handleNav} compareCount={compareSelected.length} />}

      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minWidth: 0, minHeight: 0 }}>
        {/* Mobile top bar */}
        {isMobile && (
          <div style={{ padding: '12px 16px', borderBottom: '1px solid #E4E1DA', background: '#FAFAF8', display: 'flex', alignItems: 'center', gap: 10, flexShrink: 0 }}>
            <span style={{ fontWeight: 800, fontSize: 15, color: '#1C1A17', flex: 1 }}>W&amp;B Logs</span>
            <button onClick={loadRuns} disabled={loading} style={{ border: 'none', background: 'none', cursor: 'pointer', fontSize: 18, color: '#9D9890', padding: 4 }} title="刷新">↻</button>
          </div>
        )}

        {/* Refresh button (desktop) */}
        {!isMobile && page !== 'settings' && !detailRun && (
          <div style={{ padding: '8px 16px', borderBottom: '1px solid #E4E1DA', background: '#fff', display: 'flex', alignItems: 'center', gap: 10, flexShrink: 0 }}>
            <span style={{ flex: 1, fontSize: 12, color: '#9D9890' }}>
              {runs.length} 条有效训练（本次训练 ≥{settings.minEpoch ?? 2} epoch）
            </span>
            <button onClick={loadRuns} disabled={loading} style={{ border: '1px solid #E4E1DA', background: '#fff', cursor: 'pointer', borderRadius: 7, padding: '5px 12px', fontSize: 12, color: '#6B6560', fontFamily: 'inherit' }}>
              {loading ? '加载中…' : '↻ 刷新'}
            </button>
          </div>
        )}

        <div style={{ flex: 1, overflow: 'hidden', display: 'flex', flexDirection: 'column', minHeight: 0 }}>
          {mainContent()}
        </div>

        {isMobile && <BottomNav page={detailRun ? '' : page} onNav={handleNav} compareCount={compareSelected.length} />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
