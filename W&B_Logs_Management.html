    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: #F9F8F5; color: #1C1A17; -webkit-font-smoothing: antialiased; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    ::-webkit-scrollbar { width: 5px; height: 5px; }

  <script>// W&B API
const WBApi = (() => {
  const GQL = 'https://api.wandb.ai/graphql';

  function authHeader(apiKey) {
    // wandb_v1_* keys use Bearer auth; legacy 40-char hex keys use Basic.
    if (apiKey.startsWith('wandb_v1_')) return 'Bearer ' + apiKey;
    return 'Basic ' + btoa(apiKey + ':');
  }

  // Try multiple proxy strategies in sequence
  async function gqlWithProxy(apiKey, query, variables, useProxy, customProxyOverride) {
    const customProxy = (customProxyOverride !== undefined ? customProxyOverride : (WBStore.getSettings().customProxy || '')).trim();
    const proxies = [];
    if (customProxy) {
      // Custom proxy (e.g. Cloudflare Worker) — try first; expects to forward POST to W&B GraphQL
      proxies.push(() => customProxy.replace(/\/$/, ''));
    }
    if (useProxy) {
      proxies.push(url => `https://corsproxy.io/?url=${encodeURIComponent(url)}`);
      proxies.push(url => `https://api.cors.lol/?url=${encodeURIComponent(url)}`);
      proxies.push(url => `https://thingproxy.freeboard.io/fetch/${url}`);
    }
    // No direct fallback — would always fail due to CORS

    let lastErr;
    for (const proxyFn of proxies) {
      const endpoint = proxyFn(GQL);
      try {
        const res = await fetch(endpoint, {
          method: 'POST',
          headers: {
            'Authorization': authHeader(apiKey),
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ query, variables }),
        });
        if (!res.ok) {
          let msg = `HTTP ${res.status}`;
          if (res.status === 401) msg = 'API Key 无效，请检查';
          if (res.status === 403) msg = '无权访问，请确认 Entity / Project 名称';
          throw new Error(msg);
        }
        const json = await res.json();
        if (json.errors) throw new Error(json.errors.map(e => e.message).join('; '));
        return json.data;
      } catch (e) {
        lastErr = e;
      }
    }
    throw new Error(lastErr?.message || '所有代理均失败，请检查代理配置');
  }

  const RUNS_QUERY = `
    query($entity: String!, $project: String!, $first: Int, $after: String) {
      project(name: $project, entityName: $entity) {
        runs(first: $first, after: $after) {
          pageInfo { endCursor hasNextPage }
          edges {
            node {
              id name displayName state
              config summaryMetrics tags
              createdAt heartbeatAt notes
            }
          }
        }
      }
    }
  `;

  function parseRun(node) {
    let config = {}, summary = {};
    try { config = JSON.parse(node.config || '{}'); } catch {}
    try { summary = JSON.parse(node.summaryMetrics || '{}'); } catch {}
    return { ...node, config, summary };
  }

  function getUseProxy() {
    return WBStore.getSettings().useProxy !== false;
  }

  async function loadAllRuns(apiKey, entity, project, onProgress) {
    const useProxy = getUseProxy();
    let all = [], after = null, hasNext = true;
    while (hasNext) {
      const data = await gqlWithProxy(apiKey, RUNS_QUERY, { entity, project, first: 100, after }, useProxy);
      if (!data.project) throw new Error(`找不到项目 "${project}"，请检查 Entity 和 Project 名称`);
      const { edges, pageInfo } = data.project.runs;
      const runs = edges.map(e => parseRun(e.node));
      all = all.concat(runs);
      if (onProgress) onProgress(all.length, all.length);
      hasNext = pageInfo.hasNextPage;
      after = pageInfo.endCursor;
    }
    return all;
  }

  async function loadAllRunsMulti(apiKey, entity, projects, onProgress) {
    let all = [];
    for (const project of projects) {
      const runs = await loadAllRuns(apiKey, entity, project, (n, t) => {
        if (onProgress) onProgress(all.length + n, all.length + t, project);
      });
      runs.forEach(r => { r._project = project; });
      all = all.concat(runs);
    }
    return all;
  }

  const HISTORY_QUERY = `
    query($entity: String!, $project: String!, $runName: String!) {
      project(name: $project, entityName: $entity) {
        run(name: $runName) {
          history(samples: 500)
        }
      }
    }
  `;

  async function loadHistory(apiKey, entity, project, runName, samples = 400, summaryKeys = []) {
    const useProxy = getUseProxy();
    const data = await gqlWithProxy(apiKey, HISTORY_QUERY, { entity, project, runName }, useProxy);
    const raw = data?.project?.run?.history;
    if (!raw || !Array.isArray(raw)) return [];
    return raw
      .map(item => typeof item === 'string' ? JSON.parse(item) : item)
      .sort((a, b) => (a._step ?? 0) - (b._step ?? 0));
  }

  async function testConnection(apiKey, entity, project, useProxy = true, customProxyOverride) {
    const data = await gqlWithProxy(apiKey, RUNS_QUERY, { entity, project, first: 1 }, useProxy, customProxyOverride);
    if (!data.project) throw new Error(`找不到项目 "${project}"`);
    return data;
  }

  async function listProjects(apiKey, entity, useProxy = true, customProxyOverride) {
    // Step 1: resolve actual entity name and teams from API key
    const viewerQuery = `
      query {
        viewer {
          entity
          teams { edges { node { name } } }
        }
      }
    `;
    const vd = await gqlWithProxy(apiKey, viewerQuery, {}, useProxy, customProxyOverride);
    if (!vd.viewer) throw new Error('API Key 无效，无法获取用户信息');

    const entities = new Set();
    if (entity.trim()) entities.add(entity.trim());
    if (vd.viewer.entity) entities.add(vd.viewer.entity);
    (vd.viewer.teams?.edges || []).forEach(e => entities.add(e.node.name));

    // Step 2: query models for every accessible entity
    const modelsQuery = `
      query($entity: String!) {
        models(entityName: $entity, first: 100) {
          edges { node { name } }
        }
      }
    `;
    const seen = new Set();
    const all = [];
    for (const ent of entities) {
      const d = await gqlWithProxy(apiKey, modelsQuery, { entity: ent }, useProxy, customProxyOverride);
      (d.models?.edges || []).forEach(e => {
        if (!seen.has(e.node.name)) { seen.add(e.node.name); all.push(e.node); }
      });
    }
    if (all.length === 0)
      throw new Error(`在 [${[...entities].join(', ')}] 下均未找到项目，请确认 Entity 名称`);
    return all;
  }

  async function loadLogs(apiKey, entity, project, runName) {
    const useProxy = getUseProxy();
    // directUrl returns a pre-signed S3/GCS link — no auth header needed
    const query = `
      query($entity: String!, $project: String!, $runName: String!) {
        project(name: $project, entityName: $entity) {
          run(name: $runName) {
            files(names: ["output.log"]) {
              edges { node { name directUrl } }
            }
          }
        }
      }
    `;
    const data = await gqlWithProxy(apiKey, query, { entity, project, runName }, useProxy);
    const edges = data?.project?.run?.files?.edges || [];
    if (!edges.length) return null; // run has no output.log

    const fileUrl = edges[0].node.directUrl;
    if (!fileUrl) return null;

    const proxyBase = (WBStore.getSettings().customProxy || '').replace(/\/$/, '');
    if (!proxyBase) throw new Error('需要配置本地代理才能获取日志文件');

    // Pre-signed URL: no Authorization header — sending one breaks S3/GCS signature validation
    const res = await fetch(`${proxyBase}?url=${encodeURIComponent(fileUrl)}`);
    if (res.status === 404) return null; // file recorded but not uploaded
    if (!res.ok) throw new Error(`日志文件获取失败 HTTP ${res.status}`);
    return await res.text();
  }

  async function loadMetadata(apiKey, entity, project, runName) {
    const useProxy = getUseProxy();
    const query = `
      query($entity: String!, $project: String!, $runName: String!) {
        project(name: $project, entityName: $entity) {
          run(name: $runName) {
            files(names: ["wandb-metadata.json"]) {
              edges { node { name directUrl } }
            }
          }
        }
      }
    `;
    const data = await gqlWithProxy(apiKey, query, { entity, project, runName }, useProxy);
    const edges = data?.project?.run?.files?.edges || [];
    if (!edges.length) return null;
    const fileUrl = edges[0].node.directUrl;
    if (!fileUrl) return null;
    const proxyBase = (WBStore.getSettings().customProxy || '').replace(/\/$/, '');
    if (!proxyBase) throw new Error('需要配置本地代理才能获取 metadata');
    const res = await fetch(`${proxyBase}?url=${encodeURIComponent(fileUrl)}`);
    if (!res.ok) return null;
    return await res.json();
  }

  return { testConnection, loadAllRuns, loadAllRunsMulti, loadHistory, loadLogs, loadMetadata, listProjects };
})();
</script>
  <script>// localStorage persistence layer
const WBStore = (() => {
  const KEY = 'wb_log_v1';

  const load = () => {
    try { return JSON.parse(localStorage.getItem(KEY) || '{}'); } catch { return {}; }
  };
  const commit = d => localStorage.setItem(KEY, JSON.stringify(d));

  // Settings
  const getSettings = () => load().settings || {};
  const saveSettings = patch => {
    const d = load(); d.settings = { ...d.settings, ...patch }; commit(d);
  };

  // Per-run metadata (alias, tags, notes, fav)
  const getMeta = id => (load().runs || {})[id] || {};
  const patchMeta = (id, patch) => {
    const d = load();
    if (!d.runs) d.runs = {};
    d.runs[id] = { ...d.runs[id], ...patch };
    commit(d);
  };
  const getAllMeta = () => load().runs || {};

  const toggleFav = id => {
    const m = getMeta(id);
    const next = !m.fav;
    patchMeta(id, { fav: next });
    return next;
  };
  const setAlias = (id, alias) => patchMeta(id, { alias: alias.trim() });
  const setTags  = (id, tags)  => patchMeta(id, { tags });
  const setNote  = (id, note)  => patchMeta(id, { note });

  // Tag library: [{name, colorIdx}]
  const getTagLib  = () => load().tagLib || [];
  const saveTagLib = tags => { const d = load(); d.tagLib = tags; commit(d); };

  const addTagToLib = name => {
    const lib = getTagLib();
    if (lib.find(t => t.name === name)) return lib;
    const next = [...lib, { name, colorIdx: lib.length }];
    saveTagLib(next);
    return next;
  };

  const getCustomConfig = id => (load().customConfigs || {})[id] || '';
  const setCustomConfig = (id, text) => {
    const d = load();
    if (!d.customConfigs) d.customConfigs = {};
    d.customConfigs[id] = text;
    commit(d);
  };

  const getCommandArgs = id => (load().commandArgs || {})[id] ?? null;
  const setCommandArgs = (id, obj) => {
    const d = load();
    if (!d.commandArgs) d.commandArgs = {};
    d.commandArgs[id] = obj;
    commit(d);
  };

  const getUseCommandArgs = id => {
    const m = (load().settings || {}).useCommandArgsMap || {};
    return m[id] !== false;
  };
  const setUseCommandArgs = (id, val) => {
    const d = load();
    if (!d.settings) d.settings = {};
    d.settings.useCommandArgsMap = { ...(d.settings.useCommandArgsMap || {}), [id]: val };
    commit(d);
  };

  return {
    getSettings, saveSettings,
    getMeta, patchMeta, getAllMeta,
    toggleFav, setAlias, setTags, setNote,
    getTagLib, saveTagLib, addTagToLib,
    getCustomConfig, setCustomConfig,
    getCommandArgs, setCommandArgs,
    getUseCommandArgs, setUseCommandArgs,
  };
})();
</script>

<body>
  <div id="root"></div>
  <script type="text/babel">// Shared UI components
const { useState, useEffect, useRef, useCallback } = React;

const TAG_PALETTE = [
  { bg: '#EEF1FF', fg: '#3B5BDB' },
  { bg: '#EBFBEE', fg: '#2F9E44' },
  { bg: '#FFF9DB', fg: '#E67700' },
  { bg: '#F3F0FF', fg: '#7048E8' },
  { bg: '#FFF0F6', fg: '#C2255C' },
  { bg: '#E3FAFC', fg: '#0B7285' },
  { bg: '#FFF4E6', fg: '#D9480F' },
  { bg: '#F0F9FF', fg: '#0369A1' },
];

function getTagColor(tag, tagLib = []) {
  const entry = tagLib.find(t => t.name === tag);
  const idx = entry ? entry.colorIdx : (
    [...tag].reduce((h, c) => (h * 31 + c.charCodeAt(0)) & 0xFFFF, 0)
  );
  return TAG_PALETTE[idx % TAG_PALETTE.length];
}

function TagChip({ tag, tagLib, onRemove, small }) {
  const c = getTagColor(tag, tagLib);
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 3,
      padding: small ? '1px 7px' : '2px 9px',
      borderRadius: 20, background: c.bg, color: c.fg,
      fontSize: small ? 11 : 12, fontWeight: 500, lineHeight: '18px',
      whiteSpace: 'nowrap',
    }}>
      {tag}
      {onRemove && (
        <button onClick={e => { e.stopPropagation(); onRemove(tag); }} style={{
          border: 'none', background: 'none', cursor: 'pointer',
          color: c.fg, padding: '0 0 0 2px', lineHeight: 1, fontSize: 14, opacity: 0.7,
        }}>×</button>
      )}
    </span>
  );
}

function StateBadge({ state }) {
  const MAP = {
    finished: { bg: '#DCFCE7', fg: '#15803D', label: '已完成' },
    running:  { bg: '#DBEAFE', fg: '#1D4ED8', label: '运行中' },
    crashed:  { bg: '#FEE2E2', fg: '#DC2626', label: '崩溃'   },
    failed:   { bg: '#FEE2E2', fg: '#DC2626', label: '失败'   },
  };
  const s = MAP[state] || { bg: '#F3F4F6', fg: '#6B7280', label: state || '未知' };
  return (
    <span style={{
      padding: '2px 8px', borderRadius: 20, fontSize: 11, fontWeight: 600,
      background: s.bg, color: s.fg, letterSpacing: '0.02em', whiteSpace: 'nowrap',
    }}>{s.label}</span>
  );
}

function StarBtn({ active, onClick }) {
  return (
    <button onClick={e => { e.stopPropagation(); onClick(); }} style={{
      border: 'none', background: 'none', cursor: 'pointer',
      fontSize: 20, padding: '2px 4px', lineHeight: 1,
      color: active ? '#F59E0B' : '#D1D5DB',
      transition: 'color 0.15s, transform 0.1s',
      flexShrink: 0,
    }}
    onMouseEnter={e => e.currentTarget.style.transform = 'scale(1.2)'}
    onMouseLeave={e => e.currentTarget.style.transform = 'scale(1)'}
    title={active ? '取消收藏' : '收藏'}>
      {active ? '★' : '☆'}
    </button>
  );
}

function Skeleton({ width = '100%', height = 14, radius = 4, style = {} }) {
  return (
    <div style={{
      width, height, borderRadius: radius,
      background: 'linear-gradient(90deg,#F3F2EF 25%,#E8E5DC 50%,#F3F2EF 75%)',
      backgroundSize: '200% 100%',
      animation: 'shimmer 1.4s ease-in-out infinite',
      ...style,
    }} />
  );
}

function EmptyState({ icon = '📭', title, desc, children }) {
  return (
    <div style={{ textAlign: 'center', padding: '64px 24px', color: '#9D9890' }}>
      <div style={{ fontSize: 44, marginBottom: 12, lineHeight: 1 }}>{icon}</div>
      <div style={{ fontSize: 16, fontWeight: 600, color: '#6B6560', marginBottom: 6 }}>{title}</div>
      {desc && <div style={{ fontSize: 13, marginBottom: 20, maxWidth: 320, margin: '0 auto 20px' }}>{desc}</div>}
      {children}
    </div>
  );
}

function Btn({ onClick, children, variant = 'primary', small, style: s = {}, disabled }) {
  const base = {
    border: 'none', borderRadius: 8, cursor: disabled ? 'not-allowed' : 'pointer',
    fontFamily: 'inherit', fontWeight: 500, transition: 'all 0.15s',
    padding: small ? '6px 12px' : '9px 18px',
    fontSize: small ? 13 : 14,
    opacity: disabled ? 0.5 : 1,
  };
  const variants = {
    primary: { background: '#4B6BFB', color: '#fff' },
    ghost:   { background: 'transparent', color: '#4B6BFB', border: '1px solid #4B6BFB' },
    danger:  { background: '#FEE2E2', color: '#DC2626' },
    subtle:  { background: '#F3F2EF', color: '#1C1A17' },
  };
  return (
    <button onClick={disabled ? undefined : onClick} style={{ ...base, ...variants[variant], ...s }}
      onMouseEnter={e => !disabled && (e.currentTarget.style.filter = 'brightness(0.93)')}
      onMouseLeave={e => e.currentTarget.style.filter = ''}>
      {children}
    </button>
  );
}

function Modal({ open, onClose, title, children, width = 480 }) {
  useEffect(() => {
    if (!open) return;
    const onKey = e => e.key === 'Escape' && onClose();
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [open, onClose]);
  if (!open) return null;
  return (
    <div onClick={onClose} style={{
      position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.4)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      zIndex: 1000, padding: 16,
    }}>
      <div onClick={e => e.stopPropagation()} style={{
        background: '#fff', borderRadius: 14, width: '100%', maxWidth: width,
        boxShadow: '0 20px 60px rgba(0,0,0,0.2)', overflow: 'hidden',
      }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '16px 20px', borderBottom: '1px solid #E4E1DA' }}>
          <span style={{ fontWeight: 700, fontSize: 15 }}>{title}</span>
          <button onClick={onClose} style={{ border: 'none', background: 'none', cursor: 'pointer', fontSize: 20, color: '#9D9890', padding: 4 }}>×</button>
        </div>
        <div style={{ padding: 20 }}>{children}</div>
      </div>
    </div>
  );
}

function RunCard({ run, meta, tagLib, onToggleFav, onSelect, selected, onOpen, compareMode, metrics, cardFields }) {
  const alias = meta.alias || run.displayName || run.name;
  const origName = run.name;
  const hasConfig = React.useMemo(() => !!WBStore.getCustomConfig(run.name).trim(), [run.name]);
  const tags = meta.tags || run.tags || [];
  const fields = cardFields || [...BUILTIN_FIELDS.map(f => f.key), ...(metrics || [])];
  const config = parseConfig(run.config || {});

  const renderValue = (v) => {
    if (v == null) return null;
    if (typeof v === 'number') return v % 1 === 0 ? String(v) : v.toFixed(4);
    if (typeof v === 'object') return JSON.stringify(v);
    return String(v);
  };

  // Collect extra fields (non-builtin) to show in the metrics row
  const extraFields = fields.filter(k => !BUILTIN_FIELDS.some(f => f.key === k));

  return (
    <div
      onClick={() => !compareMode && onOpen && onOpen(run)}
      style={{
        background: '#FFFFFF',
        border: selected ? '2px solid #4B6BFB' : '1px solid #E4E1DA',
        borderRadius: 10, padding: '13px 15px',
        cursor: compareMode ? 'default' : 'pointer',
        transition: 'box-shadow 0.15s', boxShadow: '0 1px 3px rgba(0,0,0,0.05)',
        userSelect: 'none',
      }}
      onMouseEnter={e => !compareMode && (e.currentTarget.style.boxShadow = '0 4px 14px rgba(0,0,0,0.09)')}
      onMouseLeave={e => e.currentTarget.style.boxShadow = '0 1px 3px rgba(0,0,0,0.05)'}
    >
      {/* Header row */}
      <div style={{ display: 'flex', alignItems: 'flex-start', gap: 8, marginBottom: 7 }}>
        {compareMode && (
          <input type="checkbox" checked={!!selected} onChange={() => onSelect(run)}
            onClick={e => e.stopPropagation()}
            style={{ marginTop: 3, cursor: 'pointer', width: 15, height: 15, accentColor: '#4B6BFB' }} />
        )}
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontWeight: 600, fontSize: 14, color: '#1C1A17', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', display: 'flex', alignItems: 'center', gap: 5 }}>
            <span style={{ overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{alias}</span>
            {hasConfig && <span title="已填写训练配置" style={{ flexShrink: 0, width: 16, height: 16, borderRadius: '50%', background: '#2F9E44', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 10, color: '#fff', fontWeight: 700 }}>✓</span>}
          </div>
          {alias !== origName && (
            <div style={{ fontSize: 11, color: '#B0A99E', fontFamily: 'monospace', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', marginTop: 1 }}>{origName}</div>
          )}
        </div>
        <StateBadge state={run.state} />
        <StarBtn active={!!meta.fav} onClick={() => onToggleFav(run.name)} />
      </div>

      {/* Tags */}
      {fields.includes('tags') && tags.length > 0 && (
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 4, marginBottom: 8 }}>
          {tags.map(t => <TagChip key={t} tag={t} tagLib={tagLib} small />)}
        </div>
      )}

      {/* Fields row */}
      {(fields.includes('epoch') || fields.includes('epochCount') || extraFields.length > 0 || fields.includes('time') || fields.includes('project')) && (
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 14, fontSize: 12, color: '#6B6560', alignItems: 'center' }}>
          {fields.includes('epoch') && (() => {
            const epoch = (run.summary || {}).epoch ?? (run.summary || {})._epoch;
            return epoch != null ? <span>Epoch&nbsp;<strong style={{ color: '#1C1A17', fontSize: 13 }}>{epoch}</strong></span> : null;
          })()}
          {fields.includes('epochCount') && (() => {
            const count = getEpochCount(run);
            return count != null ? <span>本次&nbsp;<strong style={{ color: '#1C1A17', fontSize: 13 }}>{count}</strong>&nbsp;epoch</span> : null;
          })()}
          {extraFields.map(k => {
            const v = (run.summary || {})[k] ?? config[k];
            const rendered = renderValue(v);
            if (rendered == null) return null;
            return <span key={k}>{k}&nbsp;<strong style={{ color: '#1C1A17', fontSize: 13 }}>{rendered}</strong></span>;
          })}
          {fields.includes('time') && (
            <span style={{ marginLeft: 'auto', fontSize: 11, color: '#B0A99E' }}>{fmtTime(run.createdAt)}</span>
          )}
          {fields.includes('project') && run._project && (
            <span style={{ fontSize: 11, color: '#B0A99E', background: '#F3F2EF', borderRadius: 4, padding: '1px 6px' }}>{run._project}</span>
          )}
        </div>
      )}
    </div>
  );
}

function fmtTime(ts) {
  if (!ts) return '';
  const d = new Date(ts), now = new Date();
  const diff = (now - d) / 1000;
  if (diff < 60) return '刚刚';
  if (diff < 3600) return `${Math.floor(diff / 60)}分钟前`;
  if (diff < 86400) return `${Math.floor(diff / 3600)}小时前`;
  if (diff < 86400 * 30) return `${Math.floor(diff / 86400)}天前`;
  return d.toLocaleDateString('zh-CN');
}

function parseConfig(config = {}) {
  const out = {};
  for (const [k, v] of Object.entries(config)) {
    if (k.startsWith('_')) continue;
    out[k] = (v && typeof v === 'object' && 'value' in v) ? v.value : v;
  }
  return out;
}

function getEpoch(run) {
  const s = run.summary || {};
  return s.epoch ?? s._epoch ?? null;
}

function getEpochCount(run) {
  const step = (run.summary || {})._step;
  return step != null ? Number(step) + 1 : null;
}

function isValidRun(run, minEpoch = 2) {
  const count = getEpochCount(run);
  return count !== null && count >= minEpoch;
}

function parseCommandArgs(args) {
  if (!Array.isArray(args)) return {};
  const result = {};
  for (let i = 0; i < args.length; i++) {
    const a = args[i];
    if (!a.startsWith('-')) continue;
    const key = a.replace(/^--?/, '').replace(/-/g, '_');
    if (!key) continue;
    const next = args[i + 1];
    if (!next || next.startsWith('-')) {
      result[key] = true;
    } else {
      const n = Number(next);
      result[key] = (!isNaN(n) && next.trim() !== '') ? n
        : next === 'true' ? true
        : next === 'false' ? false
        : next;
      i++;
    }
  }
  return result;
}

function flattenJson(obj, prefix = '') {
  const result = {};
  for (const [k, v] of Object.entries(obj || {})) {
    const key = prefix ? `${prefix}.${k}` : k;
    if (v !== null && typeof v === 'object' && !Array.isArray(v)) {
      Object.assign(result, flattenJson(v, key));
    } else {
      result[key] = Array.isArray(v) ? v.join(', ') : v;
    }
  }
  return result;
}

function CustomConfigTab({ runName }) {
  const [text, setText] = React.useState(() => WBStore.getCustomConfig(runName));
  const [parsed, setParsed] = React.useState(null);
  const [parseError, setParseError] = React.useState('');

  React.useEffect(() => {
    if (!text.trim()) { setParsed(null); setParseError(''); return; }
    try { setParsed(flattenJson(JSON.parse(text))); setParseError(''); }
    catch (e) { setParsed(null); setParseError(e.message); }
  }, [text]);

  const handleChange = val => { setText(val); WBStore.setCustomConfig(runName, val); };
  const entries = parsed ? Object.entries(parsed) : [];

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
      <div>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 6 }}>
          <span style={{ fontSize: 11, fontWeight: 600, color: '#6B6560', textTransform: 'uppercase', letterSpacing: '0.04em' }}>粘贴训练配置 JSON</span>
          {text && <button onClick={() => handleChange('')} style={{ border: 'none', background: 'none', cursor: 'pointer', color: '#B0A99E', fontSize: 11, fontFamily: 'inherit' }}>清除</button>}
        </div>
        <textarea value={text} onChange={e => handleChange(e.target.value)}
          placeholder={'{\n  "learning_rate": 0.001,\n  "batch_size": 32\n}'}
          style={{ width: '100%', boxSizing: 'border-box', height: 160, padding: '10px 12px',
            borderRadius: 8, border: `1px solid ${parseError ? '#E03131' : '#E4E1DA'}`,
            fontFamily: 'monospace', fontSize: 12, lineHeight: 1.6, resize: 'vertical',
            outline: 'none', background: '#FAFAF8', color: '#1C1A17' }} />
        {parseError && <div style={{ color: '#E03131', fontSize: 11, marginTop: 4 }}>JSON 解析错误：{parseError}</div>}
      </div>
      {entries.length > 0 && (
        <div>
          <div style={{ fontSize: 11, fontWeight: 600, color: '#6B6560', marginBottom: 6,
            textTransform: 'uppercase', letterSpacing: '0.04em' }}>
            识别结果 · {entries.length} 个参数
          </div>
          <div style={{ borderRadius: 8, border: '1px solid #E4E1DA', overflow: 'hidden' }}>
            {entries.map(([k, v], i) => (
              <div key={k} style={{ display: 'flex', gap: 12, padding: '7px 12px',
                background: i % 2 === 0 ? '#FAFAF8' : '#fff',
                borderBottom: i < entries.length - 1 ? '1px solid #F0EDE7' : 'none' }}>
                <span style={{ fontFamily: 'monospace', fontSize: 11, color: '#4B6BFB', minWidth: 160, flexShrink: 0 }}>{k}</span>
                <span style={{ fontSize: 13, color: '#1C1A17', wordBreak: 'break-all' }}>
                  {v === null ? <em style={{ color: '#B0A99E' }}>null</em> : typeof v === 'boolean'
                    ? <span style={{ color: v ? '#2F9E44' : '#E03131', fontWeight: 600 }}>{String(v)}</span>
                    : String(v)}
                </span>
              </div>
            ))}
          </div>
        </div>
      )}
      {text.trim() && !parseError && entries.length === 0 && (
        <div style={{ color: '#9D9890', fontSize: 13, textAlign: 'center', padding: 20 }}>JSON 为空对象</div>
      )}
    </div>
  );
}

Object.assign(window, {
  TagChip, StateBadge, StarBtn, Skeleton, EmptyState, Btn, Modal, RunCard,
  fmtTime, parseConfig, getEpoch, getEpochCount, isValidRun, TAG_PALETTE, getTagColor,
  parseCommandArgs, flattenJson, CustomConfigTab,
});
</script>
  <script type="text/babel">// Run List Page (also used for Favorites)
const { useState, useMemo, useCallback, useRef, useEffect } = React;

// Inner component: all per-project state lives here; key prop resets it on tab switch
function ProjectRunList({ runs, allMeta, tagLib, onToggleFav, onOpenRun, compareSelected, onToggleCompare, favOnly, metrics, cardFields, onChangeCardFields, defaultSortKey, onSetDefaultSort, filterStates, onFilterStatesChange }) {
  const [search, setSearch] = useState('');
  const [filterTags, setFilterTags] = useState([]);
  const [sortKey, setSortKey] = useState(defaultSortKey);
  const [sortDir, setSortDir] = useState(defaultSortKey === 'time' ? 'asc' : 'desc');
  const [compareMode, setCompareMode] = useState(false);

  const handleSortKey = useCallback((key) => {
    setSortKey(key);
    setSortDir(key === 'time' ? 'asc' : 'desc');
  }, []);

  const sortableKeys = useMemo(() => {
    const s = new Set();
    runs.forEach(r => Object.entries(r.summary || {}).forEach(([k, v]) => {
      if (!k.startsWith('_') && typeof v === 'number') s.add(k);
    }));
    return [...s].sort();
  }, [runs]);

  const summaryKeys = sortableKeys;
  const configKeys = useMemo(() => {
    const s = new Set();
    runs.forEach(r => Object.keys(parseConfig(r.config || {})).forEach(k => s.add(k)));
    return [...s].sort();
  }, [runs]);

  const allTags = useMemo(() => {
    const set = new Set();
    runs.forEach(r => { ((allMeta[r.name] || {}).tags || r.tags || []).forEach(t => set.add(t)); });
    return [...set];
  }, [runs, allMeta]);

  const filtered = useMemo(() => {
    let list = runs;
    if (favOnly) list = list.filter(r => (allMeta[r.name] || {}).fav);
    if (filterTags.length) list = list.filter(r => filterTags.some(t => ((allMeta[r.name] || {}).tags || r.tags || []).includes(t)));
    if (filterStates.length) list = list.filter(r => filterStates.includes(r.state));
    if (search.trim()) {
      const q = search.toLowerCase();
      list = list.filter(r => {
        const alias       = (allMeta[r.name] || {}).alias || '';
        const displayName = r.displayName || '';
        const tags        = ((allMeta[r.name] || {}).tags || r.tags || []).join(' ');
        const notes       = (allMeta[r.name] || {}).note || r.notes || '';
        return r.name.toLowerCase().includes(q) || displayName.toLowerCase().includes(q)
          || alias.toLowerCase().includes(q) || tags.toLowerCase().includes(q) || notes.toLowerCase().includes(q);
      });
    }
    const dir = sortDir === 'desc' ? -1 : 1;
    list = [...list].sort((a, b) => {
      let diff = 0;
      if (sortKey === 'time') diff = new Date(b.createdAt) - new Date(a.createdAt);
      else if (sortKey === 'epoch') diff = (getEpoch(b) || 0) - (getEpoch(a) || 0);
      else {
        const av = (a.summary || {})[sortKey] ?? (sortDir === 'desc' ? -Infinity : Infinity);
        const bv = (b.summary || {})[sortKey] ?? (sortDir === 'desc' ? -Infinity : Infinity);
        diff = bv - av;
      }
      return diff * dir;
    });
    return list;
  }, [runs, allMeta, favOnly, filterTags, filterStates, search, sortKey, sortDir]);

  const selectedCount = compareSelected.length;

  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100%', minHeight: 0 }}>
      {/* Toolbar */}
      <div style={{ padding: '12px 16px', borderBottom: '1px solid #E4E1DA', background: '#FAFAF8', flexShrink: 0 }}>
        <div style={{ position: 'relative', marginBottom: 10 }}>
          <span style={{ position: 'absolute', left: 10, top: '50%', transform: 'translateY(-50%)', color: '#B0A99E', fontSize: 15 }}>🔍</span>
          <input value={search} onChange={e => setSearch(e.target.value)} placeholder="搜索名称、别名、标签…"
            style={{ width: '100%', boxSizing: 'border-box', padding: '8px 12px 8px 34px', borderRadius: 8,
              border: '1px solid #E4E1DA', fontSize: 13, background: '#fff', fontFamily: 'inherit', outline: 'none', color: '#1C1A17' }} />
        </div>
        <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', alignItems: 'center' }}>
          <MultiSelectPicker
            label="标签" selected={filterTags} onChange={setFilterTags}
            options={allTags.map(t => ({ key: t, label: t }))}
            emptyText="无可用标签"
          />
          <MultiSelectPicker
            label="状态" selected={filterStates} onChange={onFilterStatesChange}
            options={[
              { key: 'finished', label: '已完成', color: '#2F9E44' },
              { key: 'running',  label: '运行中',  color: '#1971C2' },
              { key: 'crashed',  label: '崩溃',   color: '#C92A2A' },
              { key: 'killed',   label: '已终止',  color: '#E67700' },
            ]}
            emptyText="无可用状态"
          />
          <SortPicker sortKey={sortKey} sortDir={sortDir} onSort={handleSortKey} onDir={setSortDir}
            sortableKeys={sortableKeys} metrics={metrics} defaultKey={defaultSortKey} onSetDefault={onSetDefaultSort} />
          <FieldPicker cardFields={cardFields} onChangeFields={onChangeCardFields} summaryKeys={summaryKeys} configKeys={configKeys} />
          <span style={{ marginLeft: 'auto', fontSize: 12, color: '#9D9890' }}>{filtered.length} 条</span>
          <Btn small variant={compareMode ? 'primary' : 'ghost'} onClick={() => setCompareMode(m => !m)}>
            {compareMode ? '退出对比' : '对比模式'}
          </Btn>
        </div>
      </div>

      {/* Run list */}
      <div style={{ flex: 1, overflowY: 'auto', padding: 16, display: 'flex', flexDirection: 'column', gap: 10 }}>
        {filtered.length === 0 ? (
          <EmptyState icon={favOnly ? '⭐' : '📭'}
            title={favOnly ? '暂无收藏' : '没有找到符合条件的训练'}
            desc={favOnly ? '在训练列表中点击 ☆ 添加收藏' : '尝试调整搜索或过滤条件'} />
        ) : filtered.map(run => (
          <RunCard key={run.name} run={run} meta={allMeta[run.name] || {}} tagLib={tagLib}
            onToggleFav={onToggleFav} onOpen={onOpenRun} compareMode={compareMode}
            selected={compareSelected.some(r => r.name === run.name)} onSelect={onToggleCompare}
            metrics={metrics} cardFields={cardFields} />
        ))}
      </div>

      {/* Compare floating bar */}
      {compareMode && selectedCount > 0 && (
        <div style={{
          position: 'sticky', bottom: 0, background: '#1C1A17', color: '#fff',
          padding: '12px 20px', display: 'flex', alignItems: 'center', gap: 12,
          borderTop: '1px solid #333', flexShrink: 0,
        }}>
          <span style={{ flex: 1, fontSize: 14 }}>已选 <strong>{selectedCount}</strong> 条训练</span>
          {selectedCount > 1 && (
            <Btn variant="primary" small onClick={() => window.__goCompare && window.__goCompare()}>
              开始对比 →
            </Btn>
          )}
          <Btn variant="subtle" small onClick={() => window.__clearCompare && window.__clearCompare()}
            style={{ background: '#333', color: '#ccc' }}>
            清空
          </Btn>
        </div>
      )}
    </div>
  );
}

function ListPage({ runs, allMeta, tagLib, onToggleFav, onOpenRun, compareSelected, onToggleCompare, favOnly, metrics }) {
  const projects = useMemo(() => [...new Set(runs.map(r => r._project).filter(Boolean))].sort(), [runs]);
  const multiProject = projects.length > 1;
  const [activeProject, setActiveProject] = useState(() => {
    const saved = WBStore.getSettings().activeProject;
    return (saved && projects.includes(saved)) ? saved : (projects[0] || '');
  });

  const handleSetActiveProject = (p) => {
    setActiveProject(p);
    WBStore.saveSettings({ activeProject: p });
  };

  // Keep activeProject valid when runs change
  React.useEffect(() => {
    if (multiProject && activeProject && !projects.includes(activeProject)) handleSetActiveProject(projects[0] || '');
  }, [projects.join(',')]);

  const [filterStatesMap, setFilterStatesMap] = useState(() => WBStore.getSettings().filterStatesMap || {});
  const filterStates = filterStatesMap[activeProject] ?? EMPTY;
  const handleFilterStatesChange = useCallback((states) => {
    const updated = { ...filterStatesMap, [activeProject]: states };
    setFilterStatesMap(updated);
    WBStore.saveSettings({ filterStatesMap: updated });
  }, [filterStatesMap, activeProject]);

  const [defaultSortKeys, setDefaultSortKeys] = useState(() => WBStore.getSettings().defaultSortKeys || {});
  const defaultSortKey = defaultSortKeys[activeProject] || 'time';
  const handleSetDefaultSort = useCallback((key) => {
    const next = key === defaultSortKeys[activeProject] ? 'time' : key;
    const updated = { ...defaultSortKeys, [activeProject]: next };
    setDefaultSortKeys(updated);
    WBStore.saveSettings({ defaultSortKeys: updated });
  }, [defaultSortKeys, activeProject]);

  const [cardFields, setCardFields] = useState(() => {
    const saved = WBStore.getSettings().cardFields;
    return saved || [...BUILTIN_FIELDS.map(f => f.key), ...metrics.slice(0, 3)];
  });
  const handleCardFieldsChange = useCallback((fields) => {
    setCardFields(fields);
    WBStore.saveSettings({ cardFields: fields });
  }, []);

  const projectRuns = useMemo(() =>
    multiProject ? runs.filter(r => r._project === activeProject) : runs,
  [runs, activeProject, multiProject]);

  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100%', minHeight: 0 }}>
      {/* Project tabs */}
      {multiProject && (
        <div style={{ display: 'flex', borderBottom: '2px solid #E4E1DA', background: '#fff',
          flexShrink: 0, overflowX: 'auto' }}>
          {projects.map(p => {
            const count = runs.filter(r => r._project === p).length;
            const active = p === activeProject;
            return (
              <button key={p} onClick={() => handleSetActiveProject(p)} style={{
                padding: '10px 18px', border: 'none', background: 'none', cursor: 'pointer',
                borderBottom: active ? '2px solid #4B6BFB' : '2px solid transparent',
                marginBottom: -2,
                color: active ? '#4B6BFB' : '#6B6560',
                fontWeight: active ? 700 : 400,
                fontSize: 13, fontFamily: 'inherit', whiteSpace: 'nowrap',
                display: 'flex', alignItems: 'center', gap: 6,
                transition: 'color 0.15s',
              }}>
                {p}
                <span style={{
                  fontSize: 11, padding: '1px 6px', borderRadius: 10, fontWeight: 600,
                  background: active ? '#EEF1FF' : '#F3F2EF',
                  color: active ? '#4B6BFB' : '#9D9890',
                }}>{count}</span>
              </button>
            );
          })}
        </div>
      )}

      {/* Per-project list — key resets all inner state on tab switch */}
      <ProjectRunList
        key={activeProject}
        runs={projectRuns}
        allMeta={allMeta} tagLib={tagLib}
        onToggleFav={onToggleFav} onOpenRun={onOpenRun}
        compareSelected={compareSelected} onToggleCompare={onToggleCompare}
        favOnly={favOnly} metrics={metrics}
        cardFields={cardFields} onChangeCardFields={handleCardFieldsChange}
        defaultSortKey={defaultSortKey} onSetDefaultSort={handleSetDefaultSort}
        filterStates={filterStates} onFilterStatesChange={handleFilterStatesChange}
      />
    </div>
  );
}

const selectStyle = {
  padding: '6px 10px', borderRadius: 7, border: '1px solid #E4E1DA',
  fontSize: 12, background: '#fff', fontFamily: 'inherit',
  color: '#1C1A17', cursor: 'pointer', outline: 'none',
};

const SORT_BASE = [
  { key: 'time',  label: '创建时间' },
  { key: 'epoch', label: 'Epoch 数' },
];

function SortPicker({ sortKey, sortDir, onSort, onDir, sortableKeys, metrics, defaultKey, onSetDefault }) {
  const [open, setOpen]     = useState(false);
  const [query, setQuery]   = useState('');
  const [ctxMenu, setCtxMenu] = useState(null); // { x, y, itemKey, label }
  const ref   = useRef(null);
  const input = useRef(null);

  // Close dropdown on outside click
  useEffect(() => {
    if (!open) return;
    const handler = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [open]);

  // Close context menu on any click
  useEffect(() => {
    if (!ctxMenu) return;
    const handler = () => setCtxMenu(null);
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [ctxMenu]);

  // Focus search on open
  useEffect(() => { if (open) setTimeout(() => input.current?.focus(), 50); }, [open]);

  const trainKeys  = metrics.filter(k => sortableKeys.includes(k));
  const otherKeys  = sortableKeys.filter(k => !metrics.includes(k));

  const q = query.toLowerCase();
  const matchBase  = SORT_BASE.filter(i => !q || i.label.includes(q) || i.key.includes(q));
  const matchTrain = trainKeys.filter(k => !q || k.toLowerCase().includes(q));
  const matchOther = otherKeys.filter(k => !q || k.toLowerCase().includes(q));

  const currentLabel = SORT_BASE.find(i => i.key === sortKey)?.label || sortKey;
  const defaultLabel = SORT_BASE.find(i => i.key === defaultKey)?.label || defaultKey || '时间';

  const pick = (key) => { onSort(key); setOpen(false); setQuery(''); };

  const handleContextMenu = (e, itemKey, label) => {
    e.preventDefault();
    e.stopPropagation();
    setCtxMenu({ x: e.clientX, y: e.clientY, itemKey, label: label || itemKey });
  };

  const SectionLabel = ({ children }) => (
    <div style={{ padding: '6px 12px 3px', fontSize: 10, fontWeight: 700, color: '#B0A99E',
      textTransform: 'uppercase', letterSpacing: '0.08em' }}>{children}</div>
  );

  const Item = ({ itemKey, label }) => {
    const active = itemKey === sortKey;
    const isDefault = itemKey === defaultKey;
    return (
      <div onClick={() => pick(itemKey)}
        onContextMenu={e => handleContextMenu(e, itemKey, label)}
        style={{
          display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          padding: '7px 12px', cursor: 'pointer', borderRadius: 6, margin: '1px 4px',
          background: active ? '#EEF1FF' : 'transparent',
          color: active ? '#4B6BFB' : '#1C1A17',
          fontSize: 13, fontWeight: active ? 600 : 400,
          transition: 'background 0.1s',
        }}
        onMouseEnter={e => { if (!active) e.currentTarget.style.background = '#F5F4F1'; }}
        onMouseLeave={e => { if (!active) e.currentTarget.style.background = 'transparent'; }}
      >
        <span style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
          {isDefault && <span title="默认排序" style={{ fontSize: 11, color: '#F59F00' }}>★</span>}
          {label || itemKey}
        </span>
        {active && (
          <button onClick={e => { e.stopPropagation(); onDir(d => d === 'desc' ? 'asc' : 'desc'); }}
            style={{ border: 'none', background: '#D6DCFF', color: '#4B6BFB',
              borderRadius: 4, padding: '1px 6px', fontSize: 12, cursor: 'pointer',
              fontFamily: 'inherit', fontWeight: 700 }}>
            {sortDir === 'desc' ? '↓ 降序' : '↑ 升序'}
          </button>
        )}
      </div>
    );
  };

  return (
    <div ref={ref} style={{ position: 'relative' }}>
      <button onClick={() => setOpen(o => !o)} style={{
        ...selectStyle, display: 'flex', alignItems: 'center', gap: 5,
        borderColor: open ? '#4B6BFB' : '#E4E1DA',
        background: open ? '#F0F3FF' : '#fff',
        color: open ? '#4B6BFB' : '#1C1A17',
      }}>
        <span>排序：{currentLabel}</span>
        <span style={{ fontSize: 10, color: '#9D9890' }}>{sortDir === 'desc' ? '↓' : '↑'}</span>
        <span style={{ fontSize: 10 }}>▾</span>
      </button>

      {/* Right-click context menu */}
      {ctxMenu && (
        <div onMouseDown={e => e.stopPropagation()} style={{
          position: 'fixed', left: ctxMenu.x, top: ctxMenu.y, zIndex: 9999,
          background: '#fff', border: '1px solid #E4E1DA', borderRadius: 8,
          boxShadow: '0 6px 20px rgba(0,0,0,0.13)', padding: '4px',
          minWidth: 160,
        }}>
          <div style={{ padding: '4px 10px 6px', fontSize: 11, color: '#B0A99E', borderBottom: '1px solid #F0EDE7', marginBottom: 3 }}>
            {ctxMenu.label}
          </div>
          <button onClick={() => { onSetDefault(ctxMenu.itemKey); setCtxMenu(null); }}
            style={{ display: 'flex', alignItems: 'center', gap: 7, width: '100%',
              padding: '7px 10px', border: 'none', background: 'none', cursor: 'pointer',
              fontSize: 13, fontFamily: 'inherit', color: '#1C1A17', borderRadius: 5,
              textAlign: 'left',
            }}
            onMouseEnter={e => e.currentTarget.style.background = '#F5F4F1'}
            onMouseLeave={e => e.currentTarget.style.background = 'none'}
          >
            <span style={{ color: '#F59F00' }}>★</span>
            {ctxMenu.itemKey === defaultKey ? '取消默认排序' : '设为默认排序'}
          </button>
        </div>
      )}

      {open && (
        <div style={{

const EMPTY = [];

function useFloatingPicker(inputRef) {
  const [open, setOpen] = useState(false);
  const [query, setQuery] = useState('');
  const ref = useRef(null);
  useEffect(() => {
    if (!open) return;
    const h = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', h);
    return () => document.removeEventListener('mousedown', h);
  }, [open]);
  useEffect(() => { if (open) setTimeout(() => inputRef.current?.focus(), 50); }, [open]);
  return { open, setOpen, query, setQuery, ref };
}

const BUILTIN_FIELDS = [
  { key: 'tags',       label: '标签' },
